<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AI Tools — PM2 Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080818;
      --surface:  #0f0f28;
      --border:   rgba(255,255,255,.08);
      --text:     #e8e8f0;
      --muted:    #888aaa;
      --cyan:     #05bfdb;
      --purple:   #a855f7;
      --green:    #22c55e;
      --red:      #ef4444;
      --gold:     #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      display: grid; place-items: center; font-size: 1.3rem;
      flex-shrink: 0;
    }
    .header h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: -.3px; }
    .header p  { font-size: .78rem; color: var(--muted); margin-top: 2px; }
    .live-dot  {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .header-actions { display: flex; gap: 10px; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      border: none; cursor: pointer; border-radius: 10px;
      padding: 9px 18px; font-size: .82rem; font-weight: 700;
      letter-spacing: .3px; transition: opacity .2s, transform .15s;
    }
    .btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn-start-all { background: linear-gradient(135deg,var(--cyan),var(--purple)); color:#fff; }
    .btn-stop-all  { background: rgba(239,68,68,.15); color:var(--red); border:1px solid rgba(239,68,68,.25); }

    /* ── Stats bar ── */
    .stats {
      display: flex; gap: 6px; padding: 16px 32px;
      flex-wrap: wrap;
    }
    .stat-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 50px; padding: 6px 14px; font-size: .8rem;
    }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink:0; }
    .stat-dot.online  { background: var(--green); box-shadow:0 0 6px var(--green); }
    .stat-dot.stopped { background: var(--muted); }
    .stat-dot.errored { background: var(--red); }
    .stat-num { font-weight: 800; color: var(--text); }
    .stat-label { color: var(--muted); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 0 32px 32px;
    }

    /* ── Service Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,.015));
      pointer-events: none;
    }
    .card.online  { border-color: rgba(34,197,94,.2); box-shadow: 0 0 0 1px rgba(34,197,94,.05),0 4px 24px rgba(0,0,0,.3); }
    .card.stopped { border-color: rgba(255,255,255,.06); }
    .card.errored { border-color: rgba(239,68,68,.3); }

    .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .icon {
      width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
      background: rgba(255,255,255,.06);
      display: grid; place-items: center; font-size: 1.4rem;
    }
    .card-title { flex: 1; min-width: 0; }
    .card-title h3 { font-size: .95rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-title p  { font-size: .73rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }

    /* Status badge */
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 50px; padding: 3px 10px; font-size: .72rem; font-weight: 700;
      flex-shrink: 0;
    }
    .status-badge.online  { background:rgba(34,197,94,.12);  color:var(--green); border:1px solid rgba(34,197,94,.2); }
    .status-badge.stopped { background:rgba(255,255,255,.04); color:var(--muted); border:1px solid var(--border); }
    .status-badge.errored { background:rgba(239,68,68,.12);   color:var(--red);   border:1px solid rgba(239,68,68,.2); }

    /* Stats row */
    .card-stats {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 8px; margin: 14px 0;
    }
    .card-stat {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 10px; text-align: center;
    }
    .card-stat-val  { font-size: .88rem; font-weight: 800; color: var(--text); }
    .card-stat-lbl  { font-size: .65rem; color: var(--muted); margin-top: 1px; letter-spacing: .5px; text-transform: uppercase; }

    /* Port tag */
    .port-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .7rem; color: var(--cyan); font-weight: 700;
      background: rgba(5,191,219,.08); border:1px solid rgba(5,191,219,.15);
      border-radius: 6px; padding: 2px 8px; margin-bottom: 14px;
      text-decoration: none; cursor: pointer;
    }
    .port-tag:hover { background: rgba(5,191,219,.18); border-color: rgba(5,191,219,.35); }

    /* Action buttons */
    .card-actions { display: flex; gap: 8px; }
    .card-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      border: none; cursor: pointer; border-radius: 10px;
      padding: 10px; font-size: .8rem; font-weight: 700; letter-spacing: .3px;
      transition: opacity .15s, transform .15s;
    }
    .card-btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    .card-btn:disabled { opacity: .3; cursor: default; }
    .card-btn.start   { background: linear-gradient(135deg,var(--cyan),var(--purple)); color:#fff; }
    .card-btn.stop    { background:rgba(239,68,68,.12); color:var(--red); border:1px solid rgba(239,68,68,.2); }
    .card-btn.restart { background:rgba(245,158,11,.1);  color:var(--gold);border:1px solid rgba(245,158,11,.2); }
    .card-btn.open    { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); font-size: .75rem; }

    /* Log drawer */
    .log-toggle {
      background: none; border: none; color: var(--muted); font-size: .72rem;
      cursor: pointer; padding: 4px 0; display: flex; align-items: center; gap: 5px;
      margin-top: 10px; width: 100%; text-align: left;
    }
    .log-toggle:hover { color: var(--text); }
    .log-box {
      display: none; margin-top: 8px;
      background: rgba(0,0,0,.4); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      font-family: 'Consolas','Courier New',monospace; font-size: .72rem;
      color: #9ca3af; line-height: 1.5; max-height: 140px;
      overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    }
    .log-box.show { display: block; }

    /* Refresh indicator */
    .refresh-ring {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      display: grid; place-items: center; font-size: .8rem;
    }
    .refreshing { animation: spin .6s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast-wrap { position: fixed; bottom: 28px; right: 28px; z-index: 999; display:flex; flex-direction:column; gap:8px; }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 18px; font-size: .82rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      animation: slideIn .2s ease; pointer-events: none;
    }
    .toast.ok  { border-color: rgba(34,197,94,.3); color: var(--green); }
    .toast.err { border-color: rgba(239,68,68,.3);  color: var(--red); }
    @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

    @media(max-width:640px){
      .header { padding: 14px 16px; }
      .stats  { padding: 12px 16px; }
      .grid   { padding: 0 16px 24px; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">🖥️</div>
    <div>
      <h1>PM2 Dashboard &nbsp;<span class="live-dot"></span></h1>
      <p id="lastUpdate">Loading…</p>
    </div>
  </div>
  <div class="header-actions">
    <div class="refresh-ring" id="ring" title="Auto-refreshes every 4s">↻</div>
    <button class="btn btn-start-all" onclick="allAction('start')">▶ Start All</button>
    <button class="btn btn-stop-all"  onclick="allAction('stop')">■ Stop All</button>
  </div>
</header>

<div class="stats">
  <div class="stat-chip"><span class="stat-dot online"></span><span class="stat-num" id="cntOnline">—</span><span class="stat-label">&nbsp;online</span></div>
  <div class="stat-chip"><span class="stat-dot stopped"></span><span class="stat-num" id="cntStopped">—</span><span class="stat-label">&nbsp;stopped</span></div>
  <div class="stat-chip"><span class="stat-dot errored"></span><span class="stat-num" id="cntErr">—</span><span class="stat-label">&nbsp;errored</span></div>
</div>

<div class="grid" id="grid">
  <!-- cards injected by JS -->
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
let data = [];

function fmt(ms) {
  if (!ms) return '—';
  const s = Math.floor(ms/1000);
  if (s < 60)  return s+'s';
  if (s < 3600) return Math.floor(s/60)+'m '+( s%60)+'s';
  const h = Math.floor(s/3600); return h+'h '+Math.floor((s%3600)/60)+'m';
}

function statusColor(st) {
  if (st === 'online')  return 'online';
  if (st === 'errored') return 'errored';
  return 'stopped';
}

function badge(st) {
  const cls = statusColor(st);
  const dot = cls === 'online' ? '●' : cls === 'errored' ? '⚠' : '○';
  return `<span class="status-badge ${cls}">${dot} ${st.toUpperCase()}</span>`;
}

function renderCard(svc) {
  const cls    = statusColor(svc.status);
  const online = svc.status === 'online';
  return `
<div class="card ${cls}" id="card-${svc.name}">
  <div class="card-header">
    <div class="icon">${svc.icon}</div>
    <div class="card-title">
      <h3>${svc.label}</h3>
      <p>${svc.desc}</p>
    </div>
    ${badge(svc.status)}
  </div>
  <a class="port-tag" href="http://localhost:${svc.port}" target="_blank">⚡ localhost:${svc.port}</a>
  <div class="card-stats">
    <div class="card-stat">
      <div class="card-stat-val">${svc.memory > 0 ? svc.memory+'MB' : '—'}</div>
      <div class="card-stat-lbl">Memory</div>
    </div>
    <div class="card-stat">
      <div class="card-stat-val">${svc.cpu > 0 ? svc.cpu+'%' : '—'}</div>
      <div class="card-stat-lbl">CPU</div>
    </div>
    <div class="card-stat">
      <div class="card-stat-val">${online ? fmt(svc.uptime) : '—'}</div>
      <div class="card-stat-lbl">Uptime</div>
    </div>
  </div>
  <div class="card-actions">
    ${online
      ? `<button class="card-btn stop"    onclick="action('stop','${svc.name}')">■ Stop</button>
         <button class="card-btn restart" onclick="action('restart','${svc.name}')">↺ Restart</button>`
      : `<button class="card-btn start"   onclick="action('start','${svc.name}')">▶ Start</button>`
    }
    <button class="card-btn open" onclick="window.open('http://localhost:${svc.port}','_blank')" ${!online?'disabled':''}>↗ Open</button>
  </div>
  <button class="log-toggle" onclick="toggleLog('${svc.name}')">▾ Logs</button>
  <div class="log-box" id="log-${svc.name}">Loading…</div>
</div>`;
}

function render(services) {
  const grid = document.getElementById('grid');
  let html = '';
  let online=0, stopped=0, err=0;
  for (const s of services) {
    if (s.status==='online') online++;
    else if (s.status==='errored') err++;
    else stopped++;
    html += renderCard(s);
  }
  grid.innerHTML = html;
  document.getElementById('cntOnline').textContent  = online;
  document.getElementById('cntStopped').textContent = stopped;
  document.getElementById('cntErr').textContent     = err;
}

function update(services) {
  for (const svc of services) {
    const card = document.getElementById('card-'+svc.name);
    if (!card) return render(services); // first render
    const newHtml = renderCard(svc);
    const tmp = document.createElement('div');
    tmp.innerHTML = newHtml;
    const newCard = tmp.firstElementChild;
    // Preserve open log drawer
    const logBox = card.querySelector('.log-box');
    if (logBox && logBox.classList.contains('show')) {
      newCard.querySelector('.log-box').classList.add('show');
      newCard.querySelector('.log-box').textContent = logBox.textContent;
    }
    card.replaceWith(newCard);
  }
  let online=0, stopped=0, err=0;
  for (const s of services) {
    if (s.status==='online') online++;
    else if (s.status==='errored') err++;
    else stopped++;
  }
  document.getElementById('cntOnline').textContent  = online;
  document.getElementById('cntStopped').textContent = stopped;
  document.getElementById('cntErr').textContent     = err;
}

async function refresh() {
  const ring = document.getElementById('ring');
  ring.classList.add('refreshing');
  try {
    const r = await fetch('/api/status');
    const services = await r.json();
    data = services;
    if (!document.getElementById('card-'+services[0]?.name)) render(services);
    else update(services);
    const t = new Date();
    document.getElementById('lastUpdate').textContent =
      `Last updated ${t.toLocaleTimeString()} · auto-refresh 4s`;
  } catch (e) {
    document.getElementById('lastUpdate').textContent = '⚠ Could not reach PM2 API';
  } finally {
    ring.classList.remove('refreshing');
  }
}

async function action(act, name) {
  try {
    showToast(`${act === 'start' ? '▶' : act === 'stop' ? '■' : '↺'} ${act}ing ${name}…`, 'ok');
    const r = await fetch(`/api/${act}/${name}`, { method: 'POST' });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    showToast(`✓ ${name} ${act}ed`, 'ok');
    setTimeout(refresh, 700);
  } catch (e) {
    showToast(`✗ ${e.message}`, 'err');
  }
}

async function allAction(act) {
  try {
    showToast(`${act === 'start' ? '▶ Starting' : '■ Stopping'} all services…`, 'ok');
    const r = await fetch(`/api/all/${act}`, { method: 'POST' });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    showToast(`✓ All services ${act}ed`, 'ok');
    setTimeout(refresh, 1200);
  } catch (e) {
    showToast(`✗ ${e.message}`, 'err');
  }
}

const logCache = {};
async function toggleLog(name) {
  const box = document.getElementById('log-'+name);
  box.classList.toggle('show');
  if (!box.classList.contains('show')) return;
  try {
    const r = await fetch(`/api/logs/${name}`);
    const d = await r.json();
    box.textContent = d.lines || '(no logs)';
    box.scrollTop = box.scrollHeight;
  } catch { box.textContent = 'Failed to load logs'; }
}

function showToast(msg, type) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

refresh();
setInterval(refresh, 4000);
</script>
</body>
</html>
